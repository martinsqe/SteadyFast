<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ──────────────────────────────────────────────────── -->
    <title>SteadyFast — 24/7 Roadside Assistance</title>
    <meta name="description" content="24/7 on-demand roadside assistance. Get a verified mechanic to your location in minutes. Flat tyre, battery dead, engine trouble — we've got you." />
    <meta name="keywords"    content="roadside assistance, mechanic, flat tyre, battery dead, breakdown, SteadyFast" />
    <meta name="author"      content="SteadyFast" />

    <!-- ── Theme colours ─────────────────────────────────────────────────── -->
    <!-- Chrome / Android -->
    <meta name="theme-color" content="#1a2f5e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a2f5e" media="(prefers-color-scheme: dark)"  />

    <!-- ── PWA — Android / Chrome ────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── PWA — Apple iOS / iPadOS ──────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="SteadyFast" />

    <!-- ── Icons ─────────────────────────────────────────────────────────── -->
    <link rel="icon"             href="/icon.png"             type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon"        href="/mask-icon.svg"        color="#1a2f5e" />

    <!-- ── Open Graph (link previews in WhatsApp, iMessage, etc.) ─────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="SteadyFast — 24/7 Roadside Assistance" />
    <meta property="og:description" content="Get a verified mechanic to your location in minutes. Available 24/7." />
    <meta property="og:image"       content="/pwa-512x512.png" />
    <meta property="og:url"         content="https://steadyfast.app" />

    <!-- ── Twitter card ──────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="SteadyFast — 24/7 Roadside Assistance" />
    <meta name="twitter:description" content="Get a verified mechanic to your location in minutes." />
    <meta name="twitter:image"       content="/pwa-512x512.png" />

    <!-- ── Font Awesome (single copy) ────────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
